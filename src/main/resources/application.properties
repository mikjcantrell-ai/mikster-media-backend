# =============================================================================
# Mikster Media — Spring Boot Application Properties
# =============================================================================

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
# Bind to all interfaces so Railway's proxy can reach the app
server.address=0.0.0.0

# ─── SSL ────────────────────────────────────────────────────────────────────
# SSL is disabled — Railway terminates SSL at the edge and communicates with
# the container over plain HTTP internally.
server.ssl.enabled=false

# ─── MySQL Datasource ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mmai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=mmai
spring.datasource.password=T@ylor55
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=2

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# ddl-auto=update: Hibernate will auto-create/update tables to match entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.mikstermedia=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.boot.web.embedded.tomcat=INFO

# ─── App Metadata ────────────────────────────────────────────────────────────
spring.application.name=aimusicweb-backend

# ─── Admin Credentials (HTTP Basic — change before production) ───────────────
app.admin.username=admin
app.admin.password=aimusic2024!

